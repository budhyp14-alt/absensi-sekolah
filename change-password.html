<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganti Password</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .info {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Ganti Password</h2>
        <div class="info">Ini login pertama Anda. Harap ganti password.</div>
        <form id="changeForm">
            <label>Password Baru</label>
            <input type="password" id="newPassword" required minlength="6">
            <label>Konfirmasi Password</label>
            <input type="password" id="confirmPassword" required>
            <button type="submit">Simpan Password</button>
            <div id="alertMessage" style="color: red; text-align: center; margin-top: 10px;"></div>
        </form>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/https://script.google.com/macros/s/AKfycbyzyDapcsRX1c-uiNyKxZRSNFnX1xVWkEXYmJ-jv_o_a_uER7qWJ4yPc9cJ3E8VF601TQ/exec';
        const user = JSON.parse(sessionStorage.getItem('user'));

        if (!user) {
            window.location.href = 'index.html';
        }

        document.getElementById('changeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const alertDiv = document.getElementById('alertMessage');
            
            if (newPass !== confirmPass) {
                alertDiv.textContent = 'Password tidak cocok!';
                return;
            }
            
            if (newPass.length < 6) {
                alertDiv.textContent = 'Minimal 6 karakter!';
                return;
            }
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'changePassword',
                        username: user.username,
                        new_password: newPass
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Password berhasil diganti!');
                    window.location.href = 'dashboard.html';
                } else {
                    alertDiv.textContent = data.message;
                }
            } catch (error) {
                alertDiv.textContent = 'Error: ' + error.message;
            }
        });
    </script>
</body>

</html>
